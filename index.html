<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Why Not Both?</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #332d29;
      color: #f4efe8;
    }

    .page {
      display: grid;
      grid-template-columns: 240px 1fr 240px;
      gap: 24px;
      align-items: start;
      max-width: 1800px;
      margin: 0 auto;
      padding: 24px;
      box-sizing: border-box;
      min-height: 100vh;
    }

    .sidebar {
      padding-top: 40px;
    }

    .sidebar h2 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .sidebar p {
      font-size: 16px;
      line-height: 1.5;
      color: #ddd4c8;
    }

    .viz-wrap {
      display: flex;
      justify-content: center;
    }

    iframe {
      border: none;
      width: 1150px;
      height: 800px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 40px;
    }

    .nav a {
      text-decoration: none;
      color: #f4efe8;
      background-color: #433b36;
      border: 1px solid #8f7750;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: bold;
      text-align: center;
      transition: all 0.2s ease;
    }

    .nav a:hover {
      background-color: #5a4d45;
      border-color: #caa85a;
    }

    .nav a.active {
      background-color: #8f7750;
      color: #1f1a17;
    }
  </style>
</head>

<body>
  <div class="page">
    
    <!-- LEFT SIDE TEXT -->
    <aside class="sidebar">
      <h2>Overview</h2>
      <p>
        This chart compares Gold Glove and Silver Slugger award rates across MLB careers.
        Each point represents a player.
      </p>
      <p>
        Players closer to the top right were consistently strong in both.
        That combination is rare.
      </p>
      <p>
        Try selecting a player and adjusting <strong>Through Season</strong>.
      </p>
    </aside>

    <!-- MAIN VIZ -->
    <main class="viz-wrap">
      <iframe src="https://public.tableau.com/views/GGSS/Dashboard1?:showVizHome=no&:embed=true"></iframe>
    </main>

    <!-- RIGHT NAV -->
    <nav class="nav">
      <a class="active" href="index.html">Overview</a>
      <a href="page2.html">Explore Player</a>
    </nav>

  </div>
</body>
</html>
