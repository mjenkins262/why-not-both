<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Why Not Both?</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #3d3936;
      color: #f4efe8;
      overflow: hidden;
    }

    .page {
      display: grid;
      grid-template-columns: 300px auto;
      gap: 12px; /* 🔥 tightened from 32px */
      max-width: 1700px;
      margin: 0 auto;
      padding: 16px; /* 🔥 slightly reduced */
      box-sizing: border-box;
      height: 100vh;
      align-items: start;
    }

    /* LEFT PANEL */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-top: 10px;
    }

    .section h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .section p {
      font-size: 15px;
      line-height: 1.5;
      color: #ddd4c8;
    }

    /* NAV */
    .nav {
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top: 1px solid #5a4d45;
      padding-top: 14px;
    }

    .nav a {
      text-decoration: none;
      color: #f4efe8;
      background-color: #433b36;
      border: 1px solid #8f7750;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: bold;
      text-align: center;
      transition: all 0.2s ease;
    }

    .nav a:hover {
      background-color: #5a4d45;
      border-color: #caa85a;
    }

    .nav a.active {
      background-color: #8f7750;
      color: #1f1a17;
    }

    /* VIZ */
    .viz-wrap {
      display: flex;
      justify-content: flex-start; /* 🔥 pulls closer to text */
      align-items: flex-start;
    }

    .viz-inner {
      transform: scale(0.78);
      transform-origin: top left;
      width: 1500px;
      height: 950px;
    }

    iframe {
      border: none;
      width: 1500px;
      height: 950px;
    }

  </style>
</head>

<body>
  <div class="page">

    <!-- LEFT PANEL -->
    <aside class="side-panel">

      <div class="section">
        <h2>Overview</h2>
        <p>
          This chart compares Gold Glove and Silver Slugger award rates across MLB careers.
          Each point represents a player.
        </p>
        <p>
          Players closer to the top right were consistently strong in both.
          That combination is rare.
        </p>
        <p>
          Try selecting a player and adjusting <strong>Through Season</strong>.
        </p>
      </div>

      <div class="nav">
        <a class="active" href="index.html">Overview</a>
        <a href="page2.html">Explore Player</a>
      </div>

    </aside>

    <!-- MAIN VIZ -->
    <main class="viz-wrap">
      <div class="viz-inner">
        <iframe src="https://public.tableau.com/views/GGSS/Dashboard1?:showVizHome=no&:embed=true"></iframe>
      </div>
    </main>

  </div>
</body>
</html>
