<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Why Not Both?</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #3d3936;
      color: #f4efe8;
    }

    .page {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 32px;
      max-width: 1700px;
      margin: 0 auto;
      padding: 5px;
      box-sizing: border-box;
      min-height: 100vh;
      align-items: start;
    }

    .viz-wrap {
      display: flex;
      justify-content: center;
    }

    iframe {
      border: none;
      width: 1150px;
      height: 800px;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding-top: 40px;
    }

    .section h2 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .section p {
      font-size: 15px;
      line-height: 1.5;
      color: #ddd4c8;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav a {
      text-decoration: none;
      color: #f4efe8;
      background-color: #433b36;
      border: 1px solid #8f7750;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: bold;
      text-align: center;
      transition: all 0.2s ease;
    }

    .nav a:hover {
      background-color: #5a4d45;
      border-color: #caa85a;
    }

    .nav a.active {
      background-color: #8f7750;
      color: #1f1a17;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- MAIN VIZ -->
    <main class="viz-wrap">
      <iframe src="https://public.tableau.com/views/GGSS/Dashboard1?:showVizHome=no&:embed=true"></iframe>
    </main>

    <!-- RIGHT SIDE PANEL -->
    <aside class="side-panel">

      <div class="section">
        <h2>Overview</h2>
        <p>
          This chart compares Gold Glove and Silver Slugger award rates across MLB careers.
          Each point represents a player.
        </p>
        <p>
          Players closer to the top right were consistently strong in both.
          That combination is rare.
        </p>
        <p>
          Try selecting a player and adjusting <strong>Through Season</strong>.
        </p>
      </div>

      <div class="nav">
        <a class="active" href="index.html">Overview</a>
        <a href="page2.html">Explore Player</a>
      </div>

    </aside>

  </div>
</body>
</html>
